name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download modules
        working-directory: backend
        run: go mod download
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download modules
        working-directory: backend
        run: go mod download
      - name: Run tests with coverage
        working-directory: backend
        run: |
          go test ./internal/... -coverprofile=coverage.out -covermode=atomic -timeout=120s
          go tool cover -func=coverage.out
      - name: Enforce 80% coverage on services package
        working-directory: backend
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep "^github.com/realestate/backend/internal/services" \
            | awk '{sum += $3; n++} END {if (n>0) printf "%.1f", sum/n}')
          echo "Services average coverage: ${COVERAGE}%"
          python3 -c "import sys; sys.exit(0 if float('${COVERAGE}') >= 80 else 1)"
      - uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.out
          flags: backend

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_SHA=${{ github.sha }} \
            -t realestate-api:${{ github.sha }} \
            ./backend
