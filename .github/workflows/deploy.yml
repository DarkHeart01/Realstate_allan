name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push API image to GCR
        run: |
          docker build \
            --build-arg BUILD_SHA=${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/realestate-api:${{ github.sha }} \
            ./backend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/realestate-api:${{ github.sha }}

      - name: Run DB migrations before deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/realestate
            gcloud auth configure-docker --quiet
            docker run --rm \
              --env-file .env \
              gcr.io/${{ secrets.GCP_PROJECT_ID }}/realestate-api:${{ github.sha }} \
              /usr/local/bin/golang-migrate \
                -path /migrations \
                -database "$(grep '^DATABASE_URL' .env | cut -d= -f2-)" \
                up

      - name: Deploy new containers to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/realestate
            export IMAGE_TAG=${{ github.sha }}
            export GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api worker
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps api worker

            for i in $(seq 1 6); do
              sleep 5
              if curl -sf http://localhost:8080/health; then
                echo "Deploy successful (attempt $i)"
                exit 0
              fi
            done

            echo "Health check failed after 30s — rolling back"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --scale api=0 api
            exit 1
