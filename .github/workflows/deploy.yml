name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build \
            --build-arg BUILD_SHA=${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/realestate-api:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/realestate-api:latest \
            ./backend
          docker push ghcr.io/${{ github.repository_owner }}/realestate-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/realestate-api:latest

      - name: Run DB migrations before deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/realestate
            docker run --rm \
              --env-file /opt/.env \
              ghcr.io/${{ github.repository_owner }}/realestate-api:${{ github.sha }} \
              /usr/local/bin/golang-migrate \
                -path /migrations \
                -database "$(grep '^DATABASE_URL' /opt/.env | cut -d= -f2-)" \
                up

      - name: Deploy new containers to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/realestate
            export IMAGE_TAG=${{ github.sha }}
            export REPO_OWNER=${{ github.repository_owner }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api worker
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps api worker

            for i in $(seq 1 6); do
              sleep 5
              if curl -sf http://localhost:8080/health; then
                echo "Deploy successful"
                exit 0
              fi
            done

            echo "Health check failed — rolling back"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --scale api=0 api
            exit 1
