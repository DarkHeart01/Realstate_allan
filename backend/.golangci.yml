linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - exhaustive
    - noctx
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/realestate

issues:
  exclude-rules:
    # Test helpers may intentionally ignore errors.
    - path: _test\.go
      linters: [errcheck]
    # log.Printf return values are intentionally ignored.
    - source: "log\\.Print"
      linters: [errcheck]
    # http.Get in share.go is a non-critical best-effort call.
    - path: internal/services/share\.go
      linters: [noctx]
