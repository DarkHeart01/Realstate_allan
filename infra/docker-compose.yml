# infra/docker-compose.yml
version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["/app/api"]
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcs-key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/run/secrets/gcs-key.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["/app/worker"]
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcs-key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/run/secrets/gcs-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
