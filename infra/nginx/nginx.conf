# infra/nginx/nginx.conf
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Do not expose nginx version in error pages or Server header.
    server_tokens off;

    upstream api_backend {
        server api:8080;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers (applied to all responses) ──────────────────────
        add_header X-Content-Type-Options    "nosniff"          always;
        add_header X-Frame-Options           "DENY"             always;
        add_header X-XSS-Protection          "1; mode=block"    always;
        add_header Referrer-Policy           "strict-origin"    always;
        add_header Permissions-Policy        "geolocation=()"   always;
        add_header Content-Security-Policy   "default-src 'self'" always;

        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }
    }

    # ── TLS (production) ─────────────────────────────────────────────────────
    # Uncomment and configure for production TLS termination.
    # Certificates should be managed by Certbot / Let's Encrypt on the host;
    # mount them into the nginx container via volumes in docker-compose.prod.yml.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #
    #     location / {
    #         proxy_pass         http://api_backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_read_timeout 90s;
    #     }
    # }
    #
    # # Redirect HTTP → HTTPS
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
